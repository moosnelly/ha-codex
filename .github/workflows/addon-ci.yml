name: Add-on CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          bash -n codex-terminal/run.sh
          for file in codex-terminal/scripts/*.sh; do
            bash -n "$file"
          done

      - name: Validate add-on files exist
        run: |
          test -f codex-terminal/config.yaml
          test -f codex-terminal/Dockerfile
          test -f codex-terminal/build.yaml
