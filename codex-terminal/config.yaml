---
name: "Codex Terminal"
description: "Terminal interface for OpenAI Codex CLI with persistent auth and packages"
version: "2.0.1"
slug: "codex_terminal"
init: false

arch:
  - aarch64
  - amd64
  - armv7

url: "https://openai.com/codex/"

ingress: true
ingress_port: 7681
panel_icon: mdi:code-braces
panel_title: "Codex Terminal"
panel_admin: true

ports:
  7681/tcp: 7681
ports_description:
  7681/tcp: "Web terminal (not required for ingress)"

options:
  auto_launch_codex: true
  terminal_scrollback_lines: 100000
  persistent_apk_packages: []
  persistent_pip_packages: []
schema:
  auto_launch_codex: bool?
  auto_launch_claude: bool?
  terminal_scrollback_lines: int?
  persistent_apk_packages:
    - str
  persistent_pip_packages:
    - str

map:
  - config:rw

hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true

startup: services

webui: http://[HOST]:[PORT:7681]/
